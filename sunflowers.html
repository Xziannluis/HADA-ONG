<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunflowers | Kyla Jane Hada-Ong</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Prata&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page sunflower-page">
      <section class="sunflower-scene" aria-label="Sunflowers for Kyla Jane">
        <div class="sunflower-scene__topbar">
          <a class="editor-form__button editor-form__button--ghost" href="index.html">Back</a>
        </div>

        <div class="sunflower-field" aria-hidden="true">
          <span class="firefly" style="--x: 41%; --y: 16%; --s: 0.7"></span>
          <span class="firefly" style="--x: 50%; --y: 10%; --s: 0.5"></span>
          <span class="firefly" style="--x: 57%; --y: 18%; --s: 0.65"></span>
          <span class="firefly" style="--x: 62%; --y: 28%; --s: 0.42"></span>
          <span class="firefly firefly--blue" style="--x: 45%; --y: 27%; --s: 0.5"></span>
          <span class="firefly firefly--blue" style="--x: 66%; --y: 15%; --s: 0.45"></span>

          <span class="grass grass--left" style="--x: 18%; --h: 250px; --r: -18deg"></span>
          <span class="grass grass--left" style="--x: 23%; --h: 310px; --r: 8deg"></span>
          <span class="grass grass--left" style="--x: 29%; --h: 220px; --r: -26deg"></span>
          <span class="grass grass--right" style="--x: 72%; --h: 240px; --r: 18deg"></span>
          <span class="grass grass--right" style="--x: 78%; --h: 300px; --r: -8deg"></span>
          <span class="grass grass--right" style="--x: 84%; --h: 210px; --r: 28deg"></span>

          <div class="sunflower-bouquet">
            <div class="sunflower sunflower--left" style="--x: 34%; --y: 45%; --s: 0.9; --r: -18deg"></div>
            <div class="sunflower sunflower--center" style="--x: 50%; --y: 25%; --s: 1.12; --r: 0deg"></div>
            <div class="sunflower sunflower--right" style="--x: 65%; --y: 38%; --s: 0.96; --r: 16deg"></div>
          </div>
        </div>

        <section class="sunflower-message">
          <p class="panel__eyebrow">For Kyla Jane</p>
          <h1>May your day bloom as brightly as every sunflower here.</h1>
          <p>
            These wishes were made with love, gathered from the people who care about you, and kept here as a little
            golden garden for your birthday.
          </p>
        </section>
      </section>
    </main>

    <script>
      if (localStorage.getItem("forherjada_auth") !== "true") {
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
