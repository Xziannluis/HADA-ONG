<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunflowers | Kyla Jane Hada-Ong</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Prata&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page sunflower-page">
      <section class="sunflower-scene" aria-label="Sunflowers for Kyla Jane">
        <div class="sunflower-scene__topbar">
          <a class="editor-form__button editor-form__button--ghost" href="index.html">Back</a>
        </div>

        <div class="sunflower-field" aria-hidden="true">
          <div class="sunflower-bouquet">
            <div class="sunflower sunflower--side" style="--x: 4%; --y: 38%; --s: 1.18; --r: -22deg; --d: 0.1s">
              <span class="sunflower__stem"></span>
              <span class="sunflower__leaf sunflower__leaf--one"></span>
              <span class="sunflower__leaf sunflower__leaf--two"></span>
              <span class="sunflower__head"></span>
            </div>
            <div class="sunflower" style="--x: 18%; --y: 58%; --s: 0.95; --r: -9deg; --d: 0.25s">
              <span class="sunflower__stem"></span>
              <span class="sunflower__leaf sunflower__leaf--one"></span>
              <span class="sunflower__leaf sunflower__leaf--two"></span>
              <span class="sunflower__leaf sunflower__leaf--three"></span>
              <span class="sunflower__head"></span>
            </div>
            <div class="sunflower" style="--x: 31%; --y: 73%; --s: 0.82; --r: 10deg; --d: 0.4s">
              <span class="sunflower__stem"></span>
              <span class="sunflower__leaf sunflower__leaf--one"></span>
              <span class="sunflower__leaf sunflower__leaf--two"></span>
              <span class="sunflower__head"></span>
            </div>
            <div class="sunflower sunflower--center" style="--x: 47%; --y: 49%; --s: 1.1; --r: -4deg; --d: 0.55s">
              <span class="sunflower__stem"></span>
              <span class="sunflower__leaf sunflower__leaf--one"></span>
              <span class="sunflower__leaf sunflower__leaf--two"></span>
              <span class="sunflower__leaf sunflower__leaf--three"></span>
              <span class="sunflower__head"></span>
            </div>
            <div class="sunflower" style="--x: 61%; --y: 29%; --s: 1; --r: 7deg; --d: 0.2s">
              <span class="sunflower__stem"></span>
              <span class="sunflower__leaf sunflower__leaf--one"></span>
              <span class="sunflower__leaf sunflower__leaf--two"></span>
              <span class="sunflower__leaf sunflower__leaf--three"></span>
              <span class="sunflower__head"></span>
            </div>
            <div class="sunflower" style="--x: 75%; --y: 55%; --s: 0.9; --r: 15deg; --d: 0.35s">
              <span class="sunflower__stem"></span>
              <span class="sunflower__leaf sunflower__leaf--one"></span>
              <span class="sunflower__leaf sunflower__leaf--two"></span>
              <span class="sunflower__head"></span>
            </div>
            <div class="sunflower sunflower--hero" style="--x: 88%; --y: 31%; --s: 1.52; --r: 10deg; --d: 0.5s">
              <span class="sunflower__stem"></span>
              <span class="sunflower__leaf sunflower__leaf--one"></span>
              <span class="sunflower__leaf sunflower__leaf--two"></span>
              <span class="sunflower__leaf sunflower__leaf--three"></span>
              <span class="sunflower__head"></span>
            </div>
            <div class="sunflower sunflower--low" style="--x: 56%; --y: 79%; --s: 0.86; --r: -10deg; --d: 0.65s">
              <span class="sunflower__stem"></span>
              <span class="sunflower__leaf sunflower__leaf--one"></span>
              <span class="sunflower__leaf sunflower__leaf--two"></span>
              <span class="sunflower__head"></span>
            </div>
          </div>
        </div>

        <section class="sunflower-message">
          <p class="panel__eyebrow">For Kyla Jane</p>
          <h1>May your day bloom as brightly as every sunflower here.</h1>
          <p>
            These wishes were made with love, gathered from the people who care about you, and kept here as a little
            golden garden for your birthday.
          </p>
        </section>
      </section>
    </main>

    <script>
      if (localStorage.getItem("forherjada_auth") !== "true") {
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
